<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Edupartner</title>
    <script>
      (function () {
        var location = window.location;
        var baseSegment = "edupartner-website";
        var pathSegmentsToKeep = location.pathname.split("/")[1] === baseSegment ? 1 : 0;
        var basePath = location.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/");
        var routePath = location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/");
        var redirectUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          basePath +
          "/?/" +
          routePath.replace(/&/g, "~and~") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
